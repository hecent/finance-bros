<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Life Sim</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <div class="left-panel">
            <h1>University Life Sim</h1>
            <div class="info-row">
                <span id="year"></span>
                <span id="week"></span>
            </div>

            <div class="scenario-box">
                <h2>Decision</h2>
                <p id="scenario-text"></p>
            </div>

            <div id="choices" class="choices"></div>
        </div>

        <div class="right-panel">
            <h2>Stats</h2>

            <div class="stat-card">
                <label>Balance</label>
                <div id="balance"></div>
            </div>

            <div class="stat-card">
                <label>Happiness</label>
                <div id="happiness"></div>
            </div>

            <div class="stat-card">
                <label>Grades</label>
                <div id="grades"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
